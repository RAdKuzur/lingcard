version: '1.0'

services:
  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./build/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - network

  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: migrate
    networks:
      - network
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: db:seed
    networks:
      - network
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
      migrator:
        condition: service_completed_successfully


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: serve --port=8080 --host=0.0.0.0
    networks:
      - network
    depends_on:
      - db

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: queue:work
    networks:
      - network
    restart: always
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started

  redis:
    image: redis:latest
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - network

volumes:
  redis_data:
  postgres_data:

networks:
  network:
    driver: bridge