worker_processes  1;
events {
    worker_connections  1024;
}
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80 default_server;
        server_name _;
        return 444;  # или return 403;
    }

    server {
        server_name lingcard.online www.lingcard.online;

        location / {
            proxy_pass http://localhost:5173;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location ~ ^/api/(.*)$ {
            proxy_pass http://localhost:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
                location /app/ {
                    proxy_pass http://localhost:5000;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "Upgrade";

                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }
        listen 443 ssl;
        ssl_certificate /etc/letsencrypt/live/lingcard.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lingcard.online/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}


server {
    if ($host = www.lingcard.online) {
        return 301 https://$host$request_uri;
    }


    if ($host = lingcard.online) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name lingcard.online www.lingcard.online;
    return 404;
    }
}
