version: '3.8'

services:
  db:
    image: postgres:17
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    networks:
      - network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - network
    depends_on:
      websocket:
        condition: service_started

  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: migrate
    networks:
      - network
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: octane:start --server=swoole --port=8080 --host=0.0.0.0
    ports:
      - "8080:8080"
    networks:
      - network
    depends_on:
      - db

  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: queue:work
    networks:
      - network
    restart: always
    depends_on:
      backend:
        condition: service_started
      db:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_started

  redis:
    image: redis:latest
    restart: always
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - network

  websocket:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: reverb:start --port=5000 --host=0.0.0.0
    ports:
      - "5000:5000"
    networks:
      - network
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started
      migrator:
        condition: service_completed_successfully

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - network

volumes:
  redis_data:
  postgres_data:
  prometheus_data:

networks:
  network:
    driver: bridge